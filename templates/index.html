<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI vs Real Image Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding: 40px;
        }
        h1 {
            margin-bottom: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        input[type="file"] {
            padding: 10px;
            background: #222;
            color: white;
            border: 1px solid #444;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #00adb5;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #008b8f;
        }
        img {
            margin-top: 20px;
            max-width: 300px;
            border-radius: 10px;
        }
        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
        .confidence {
            margin-top: 5px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <h1>AI vs Real Image Detector</h1>

    <!-- Upload Form -->
    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" onchange="previewImage(event)" required>
        <br>
        <button type="submit">Check Image</button>
    </form>

    <!-- Image Preview -->
    <div>        <img id="preview" style="display:none;">
    </div>

    <!-- Result from Flask -->
    {% if result %}
        <div class="result">
            Result: {{ result }}
        </div>

        <div class="confidence">
            Confidence: {{ confidence }}
        </div>
    {% endif %}

    <!-- JS for preview -->
    <script>
        function previewImage(event) {
            const img = document.getElementById('preview');
            img.src = URL.createObjectURL(event.target.files[0]);
            img.style.display = "block";
        }
    </script>

</body>
</html>
